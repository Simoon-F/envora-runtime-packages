name: Build PHP macOS Runtime

on:
  workflow_dispatch:
    inputs:
      version:
        description: "PHP version to build, for example 8.4.8"
        required: true
        type: string
      publish:
        description: "Upload packages to the php-{version} GitHub Release"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build:
    name: Build PHP ${{ inputs.version }} for ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: arm64
          - runner: macos-15-intel
            arch: x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate runner architecture
        shell: bash
        run: |
          set -euo pipefail
          actual_arch="$(uname -m)"
          expected_arch="${{ matrix.arch }}"
          if [[ "$actual_arch" != "$expected_arch" ]]; then
            echo "Expected $expected_arch runner, got $actual_arch"
            exit 1
          fi

      - name: Install build dependencies
        shell: bash
        run: |
          set -euo pipefail
          deps=(
            autoconf
            bison
            re2c
            pkg-config
            openssl@3
            libxml2
            oniguruma
            curl
            libiconv
            sqlite
            zlib
            bzip2
            freetype
            gettext
            icu4c
            jpeg-turbo
            libffi
            libpng
            libsodium
            libxslt
            libzip
          )
          missing=()

          for dep in "${deps[@]}"; do
            if ! brew list --formula "$dep" >/dev/null 2>&1; then
              missing+=("$dep")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            brew install "${missing[@]}"
          else
            echo "All PHP build dependencies are already installed."
          fi

      - name: Download PHP source
        shell: bash
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          work_dir="/tmp/php-build-${version}"
          rm -rf "$work_dir"
          mkdir -p "$work_dir"
          curl -fsSL "https://www.php.net/distributions/php-${version}.tar.gz" -o "$work_dir/php-${version}.tar.gz"
          tar -xzf "$work_dir/php-${version}.tar.gz" -C "$work_dir"

      - name: Configure PHP
        shell: bash
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          brew_prefix="$(brew --prefix)"
          brew_opt="$brew_prefix/opt"
          source_dir="/tmp/php-build-${version}/php-${version}"
          install_dir="/tmp/php-package/${version}"

          rm -rf "/tmp/php-package"
          rm -rf "$install_dir"
          mkdir -p "$install_dir"

          export TERM=dumb
          export PATH="$brew_opt/bison/bin:$brew_prefix/bin:/usr/bin:/bin:/usr/sbin:/sbin"
          export CFLAGS="-I$brew_prefix/include -I$brew_opt/libiconv/include -I$brew_opt/zlib/include -I$brew_opt/bzip2/include"
          export CPPFLAGS="-I$brew_prefix/include -I$brew_opt/libiconv/include -I$brew_opt/zlib/include -I$brew_opt/bzip2/include"
          export LDFLAGS="-L$brew_prefix/lib -L$brew_opt/libiconv/lib -L$brew_opt/zlib/lib -L$brew_opt/bzip2/lib"

          pkg_config_path="$brew_prefix/lib/pkgconfig"
          for pkg in openssl@3 libxml2 curl oniguruma libiconv sqlite zlib bzip2 freetype gettext icu4c jpeg-turbo libffi libpng libsodium libxslt libzip; do
            path="$brew_opt/$pkg/lib/pkgconfig"
            [[ -d "$path" ]] && pkg_config_path="$pkg_config_path:$path"
          done
          export PKG_CONFIG_PATH="$pkg_config_path"

          cd "$source_dir"
          ./configure \
            --prefix="$install_dir" \
            --with-config-file-path="$install_dir/lib" \
            --with-config-file-scan-dir="$install_dir/etc/conf.d" \
            --with-openssl \
            --with-curl \
            --with-zlib \
            --with-iconv="$brew_opt/libiconv" \
            --with-bz2="$brew_opt/bzip2" \
            --enable-mbstring \
            --enable-bcmath=shared \
            --enable-calendar=shared \
            --enable-exif=shared \
            --enable-ftp=shared \
            --enable-gd=shared \
            --with-jpeg \
            --with-freetype \
            --with-gettext=shared \
            --enable-intl=shared \
            --enable-pcntl=shared \
            --enable-shmop=shared \
            --with-sodium=shared \
            --enable-soap=shared \
            --enable-sockets=shared \
            --with-ffi=shared \
            --with-xsl=shared \
            --with-zip=shared \
            --enable-fpm \
            --with-pdo-mysql=mysqlnd \
            --with-mysqli=mysqlnd \
            --with-libxml \
            --enable-opcache

      - name: Build and install PHP
        shell: bash
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          source_dir="/tmp/php-build-${version}/php-${version}"

          cd "$source_dir"
          make -j"$(sysctl -n hw.ncpu)"
          make install

      - name: Prepare runtime package
        shell: bash
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          arch="${{ matrix.arch }}"
          package_root="/tmp/php-package"
          install_dir="$package_root/${version}"
          package="$package_root/php-${version}-macos-${arch}.tar.gz"

          mkdir -p "$install_dir/etc/conf.d" "$install_dir/var/run" "$install_dir/var/log"

          if [[ -f assets/php.ini.default ]]; then
            cp assets/php.ini.default "$install_dir/lib/php.ini"
          fi

          for bin in "$install_dir/bin/php" "$install_dir/bin/php-cgi" "$install_dir/sbin/php-fpm"; do
            if [[ -f "$bin" ]]; then
              strip "$bin" || true
              codesign --force --sign - "$bin"
            fi
          done

          find "$install_dir/lib/php/extensions" -name "*.so" -type f -print0 2>/dev/null | while IFS= read -r -d '' so; do
            strip "$so" || true
            codesign --force --sign - "$so" || true
          done

          "$install_dir/bin/php" -v
          echo "Loadable extensions:"
          find "$install_dir/lib/php/extensions" -maxdepth 3 -type f -name "*.so" -print | sort

          "$install_dir/bin/php" -m | grep -iE "curl|mbstring|mysqli|mysqlnd|openssl|pdo|opcache"
          test -f "$install_dir/lib/php/extensions"/*/gd.so
          test -f "$install_dir/lib/php/extensions"/*/intl.so
          test -f "$install_dir/lib/php/extensions"/*/zip.so

          cd "$package_root"
          tar -czf "$package" "$version"
          shasum -a 256 "$package" > "$package.sha256"
          ls -lh "$package" "$package.sha256"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: php-${{ inputs.version }}-macos-${{ matrix.arch }}
          path: |
            /tmp/php-package/php-${{ inputs.version }}-macos-${{ matrix.arch }}.tar.gz
            /tmp/php-package/php-${{ inputs.version }}-macos-${{ matrix.arch }}.tar.gz.sha256
          if-no-files-found: error

  publish:
    name: Publish PHP ${{ inputs.version }} Release
    runs-on: ubuntu-latest
    needs: build
    if: ${{ inputs.publish }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          tag="php-${VERSION}"
          title="PHP ${VERSION} macOS runtimes"
          notes_file="$RUNNER_TEMP/php-release-notes.md"
          repo="${GITHUB_REPOSITORY}"

          {
            echo "Pre-compiled PHP ${VERSION} runtimes for Envora on macOS."
            echo
            echo "Includes php, php-cgi, php-fpm, phpize, and php-config."
            echo
            echo "Common official extensions are packaged as loadable .so modules so Envora can enable them on demand."
            echo
            echo "Assets:"
            for package in dist/php-${VERSION}-macos-*.tar.gz; do
              echo "- $(basename "$package")"
            done
          } > "$notes_file"

          if gh release view "$tag" --repo "$repo" >/dev/null 2>&1; then
            gh release edit "$tag" --repo "$repo" --title "$title" --notes-file "$notes_file"
          else
            gh release create "$tag" --repo "$repo" --title "$title" --notes-file "$notes_file"
          fi

          gh release upload "$tag" dist/* --repo "$repo" --clobber
