name: Build PHP macOS Runtime

on:
  workflow_dispatch:
    inputs:
      version:
        description: "PHP version to build, for example 8.4.8"
        required: true
        type: string
      publish:
        description: "Upload packages to the php-{version} GitHub Release"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build PHP ${{ inputs.version }} for ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: arm64
          - runner: macos-15-intel
            arch: x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate runner architecture
        shell: bash
        run: |
          set -euo pipefail
          actual_arch="$(uname -m)"
          expected_arch="${{ matrix.arch }}"
          if [[ "$actual_arch" != "$expected_arch" ]]; then
            echo "Expected $expected_arch runner, got $actual_arch"
            exit 1
          fi

      - name: Prepare packaging scripts
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/php/*.sh

      - name: Build PHP
        shell: bash
        run: |
          set -euo pipefail
          scripts/php/build-php-macos.sh "${{ inputs.version }}"

      - name: Package and verify runtime
        shell: bash
        run: |
          set -euo pipefail
          scripts/php/package-macos-runtime.sh "${{ inputs.version }}" "${{ matrix.arch }}"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: php-${{ inputs.version }}-macos-${{ matrix.arch }}
          path: |
            /tmp/php-package/php-${{ inputs.version }}-macos-${{ matrix.arch }}.tar.gz
            /tmp/php-package/php-${{ inputs.version }}-macos-${{ matrix.arch }}.tar.gz.sha256
          if-no-files-found: error

  publish:
    name: Publish PHP ${{ inputs.version }} Release
    runs-on: ubuntu-latest
    needs: build
    if: ${{ inputs.publish }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          tag="php-${VERSION}"
          title="PHP ${VERSION} macOS runtimes"
          notes_file="$RUNNER_TEMP/php-release-notes.md"
          manifest_file="$RUNNER_TEMP/php-${VERSION}-manifest.json"
          repo="${GITHUB_REPOSITORY}"

          chmod +x scripts/php/*.sh
          scripts/php/write-manifest.sh "$VERSION" dist "$manifest_file"

          {
            echo "Pre-compiled PHP ${VERSION} runtimes for Envora on macOS."
            echo
            echo "Includes php, php-cgi, php-fpm, phpize, and php-config."
            echo
            echo "Common official extensions are packaged as loadable .so modules so Envora can enable them on demand."
            echo
            echo "Assets:"
            for package in dist/php-${VERSION}-macos-*.tar.gz; do
              echo "- $(basename "$package")"
            done
          } > "$notes_file"

          if gh release view "$tag" --repo "$repo" >/dev/null 2>&1; then
            gh release edit "$tag" --repo "$repo" --title "$title" --notes-file "$notes_file"
          else
            gh release create "$tag" --repo "$repo" --title "$title" --notes-file "$notes_file"
          fi

          gh release upload "$tag" dist/* "$manifest_file" --repo "$repo" --clobber
