name: Build PHP Windows Runtime

on:
  workflow_dispatch:
    inputs:
      version:
        description: "PHP version to build, for example 8.4.8"
        required: true
        type: string
      publish:
        description: "Upload packages to the php-{version} GitHub Release"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build PHP ${{ inputs.version }} for Windows ${{ matrix.arch }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build PHP
        shell: pwsh
        run: |
          ${{ github.workspace }}/scripts/php/build-php-windows.ps1 -Version "${{ inputs.version }}"

      - name: Package and verify runtime
        shell: pwsh
        run: |
          ${{ github.workspace }}/scripts/php/package-windows-runtime.ps1 -Version "${{ inputs.version }}" -Arch "${{ matrix.arch }}"
          ${{ github.workspace }}/scripts/php/verify-windows-runtime.ps1 -Version "${{ inputs.version }}"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: php-${{ inputs.version }}-windows-${{ matrix.arch }}
          path: |
            C:/php-package/php-${{ inputs.version }}-windows-${{ matrix.arch }}.zip
            C:/php-package/php-${{ inputs.version }}-windows-${{ matrix.arch }}.zip.sha256
          if-no-files-found: error

  publish:
    name: Publish PHP ${{ inputs.version }} Windows Release
    runs-on: ubuntu-latest
    needs: build
    if: ${{ inputs.publish }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          tag="php-${VERSION}-windows"
          title="PHP ${VERSION} Windows runtime"
          notes_file="$RUNNER_TEMP/php-windows-release-notes.md"
          manifest_file="$RUNNER_TEMP/php-${VERSION}-manifest.json"
          repo="${GITHUB_REPOSITORY}"

          chmod +x scripts/php/*.sh
          scripts/php/write-manifest.sh "$VERSION" dist "$manifest_file"

          {
            echo "Pre-compiled PHP ${VERSION} runtime for Envora on Windows."
            echo
            echo "Built with Visual Studio 2022 (MSVC).  Includes php,"
            echo "php-cgi, and php-fpm executables."
            echo
            echo "Common official extensions are packaged as loadable .dll modules"
            echo "so Envora can enable them on demand."
            echo
            echo "Assets:"
            for package in dist/php-${VERSION}-windows-*.zip; do
              echo "- $(basename "$package")"
            done
          } > "$notes_file"

          if gh release view "$tag" --repo "$repo" >/dev/null 2>&1; then
            gh release edit "$tag" --repo "$repo" --title "$title" --notes-file "$notes_file"
          else
            gh release create "$tag" --repo "$repo" --title "$title" --notes-file "$notes_file"
          fi

          gh release upload "$tag" dist/* "$manifest_file" --repo "$repo" --clobber
